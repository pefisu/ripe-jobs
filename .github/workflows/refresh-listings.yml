name: Refresh Nihal job listings (DISABLED)

# Disabled 2026-06-27: dentalilan.com sits behind a Cloudflare bot challenge
# that no headless/server-side fetch can pass (tried plain curl, Playwright,
# patchright stealth, all blocked). Refreshes now happen locally via the
# refresh-nihal-jobs skill on the owner's Mac, which uses real Chrome.
# Keeping the file (with manual-only trigger) so the workflow exists for
# emergency manual runs if Cloudflare ever relaxes; remove if no longer needed.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh listings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_jobs.py

      - name: Commit if listings changed
        run: |
          git config user.name "listings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add uploads/jobs.json
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "Auto-refresh listings ($(date +%F))"
            git push
          fi
