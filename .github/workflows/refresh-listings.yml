name: Refresh Nihal job listings

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC (~09:00 Istanbul)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh listings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_jobs.py

      - name: Commit if listings changed
        run: |
          git config user.name "listings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add uploads/jobs.json
          if git diff --staged --quiet; then
            echo "No changes this run."
          else
            git commit -m "Auto-refresh listings ($(date +%F))"
            git push
          fi
